<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ошибка SpotSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #23272a; color: #eee; font-family: 'Segoe UI', Arial, sans-serif; margin:0;}
        .container { max-width: 410px; margin: 80px auto; background: #2c2f33; border-radius: 16px; box-shadow: 0 2px 22px rgba(0,0,0,0.6); padding: 36px; text-align: center; }
        .logo { font-size: 44px; margin-bottom: 16px;}
        h3 { color: #ff5666; margin-bottom: 14px;}
        .msg { color: #eee; font-size: 16px;}
        .btn { background: linear-gradient(90deg, #1db954 60%, #1ed760 100%); color: #23272a; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; height: 44px; cursor: pointer; margin-top: 18px;}
        .btn:hover { background: linear-gradient(90deg, #19a34a 60%, #1ed760 100%);}
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">⚠️</span>
        <h3>Ошибка</h3>
        <div class="msg">{{ error_message }}</div>
        <a href="/add-tracks"><button class="btn">Попробовать снова</button></a>
    </div>
</body>
</html>

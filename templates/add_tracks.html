<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить треки в плейлист Spotify</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #23272a;
            color: #eee;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 60px auto 0 auto;
            background: #2c2f33;
            border-radius: 16px;
            box-shadow: 0 2px 24px rgba(0,0,0,0.6);
            padding: 32px;
        }
        h2 {
            text-align: center;
            margin-bottom: 24px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
            padding: 10px;
            background: #23272a;
            color: #eee;
            resize: vertical;
        }
        label {
            margin-bottom: 4px;
            font-weight: 500;
        }
        input[type="text"] {
            border-radius: 6px;
            border: none;
            padding: 10px;
            font-size: 16px;
            background: #23272a;
            color: #eee;
            margin-bottom: 4px;
        }
        .btn {
            background: linear-gradient(90deg, #1db954 60%, #1ed760 100%);
            color: #23272a;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            height: 44px;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: linear-gradient(90deg, #19a34a 60%, #1ed760 100%);
        }
        .hint {
            font-size: 15px;
            color: #b9bbbe;
            margin-bottom: 6px;
        }
        @media (max-width: 600px) {
            .container { max-width: 96vw; padding: 8vw; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Добавить треки в плейлист Spotify</h2>
        <form method="post">
            <label for="playlist_name">Название плейлиста:</label>
            <input type="text" id="playlist_name" name="playlist_name" placeholder="Например: Roadtrip, Chill, Сплин ?" required>

            <label for="tracks_text">Треки (каждый с новой строки):</label>
            <span class="hint">Формат: Исполнитель - Название<br>Пример:<br>ДДТ - Это всё<br>The Weeknd - Blinding Lights</span>
            <textarea id="tracks_text" name="tracks_text" placeholder="Исполнитель - Название трека" required></textarea>

            <button type="submit" class="btn">Добавить треки</button>
        </form>
    </div>
</body>
</html>

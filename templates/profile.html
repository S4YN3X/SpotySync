<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль SpotSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #23272a; color: #eee; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; min-height: 100vh;}
        .container { max-width: 440px; margin: 80px auto; background: #2c2f33; border-radius: 16px; box-shadow: 0 2px 24px rgba(0,0,0,0.6); padding: 36px; text-align: center;}
        .logo { font-size: 42px; margin-bottom: 18px;}
        h3 { margin-bottom: 14px;}
        .btn { margin-top: 24px; background: linear-gradient(90deg, #1db954 60%, #1ed760 100%); color: #23272a; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; height: 44px; cursor: pointer; transition: background 0.2s;}
        .btn:hover { background: linear-gradient(90deg, #19a34a 60%, #1ed760 100%);}
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">👋</span>
        <h3>Привет, {{ username }}!</h3>
        <div>Ты успешно авторизован через Spotify ✅</div>
        <form action="/add">
            <button class="btn" type="submit">Добавить треки</button>
        </form>
    </div>
</body>
</html>
